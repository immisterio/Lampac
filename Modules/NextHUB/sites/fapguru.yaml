list:
  uri: videos?page={page}

search:
  uri: videos/search?q={search}

contentParse:
  nodes: //div[@class='video trailer']
  name:
    node: .//div[@class='title']
  href:
    node: .//a
    attribute: href
  img:
    node: .//img
    attribute: src
  duration:
    node: .//span[@class='info-column column-time']
  preview:
    attribute: id
    format: 'https://m.fap-guru.pro/images/trailer/{value}.webm'

view:
  related: true
  bindingToIP: true
  viewsource: true
  regexMatch:
    pattern: '<source src="([^\"]+)"'
