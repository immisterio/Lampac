{
  "exceptionHandlerLogTarget": "none",
  "serilog": false,
  "listen": {
    "version": true,
    "ResponseCancelAfter": 10
  },
  "LampaWeb": {
    "initPlugins": {
      "pirate_store": true,
      "jacred": true,
      "tmdbProxy": true,
      "cubProxy": true,
      "online": true,
      "sisi": true,
      "torrserver": true,
      "timecode": true
    }
  },
  "BaseModule": {
    "ValidateRequest": false,
    "ValidateIdentity": false,
    "BlockedBots": false,
    "LoadModules": [
      ".*"
    ],
    "SkipModules": [
      "Catalog",
      "DLNA",
      "Tracks",
      "Transcoding",
      "WebLog",
      "CacheMedia",
      "ProxyLimiter",
      "ForkPlayerXML",
      "MsxNative",
      "TelegramAuth",
      "TelegramAuthBot"
    ],
    "Middlewares": {
      "staticFiles": true,
      "staticFilesMappings": {
        ".m4s": "video/mp4",
        ".ts": "video/mp2t",
        ".mp4": "video/mp4",
        ".mkv": "video/x-matroska",
        ".m3u": "application/x-mpegURL",
        ".m3u8": "application/vnd.apple.mpegurl",
        ".webm": "video/webm",
        ".m2ts": "video/MP2T"
      }
    }
  },
  "accsdb": {
    "enable": false
  },
  "WAF": {
    "enable": false
  },
  ///////////////////////////////////////////////////////////////////
  // Удалите настройки ниже если сервис использует более 10 человек
  ///////////////////////////////////////////////////////////////////
  "lowMemoryMode": true,
  "pool": {
    "BufferSize": 32000,
    "BufferMax": 50000000,
	"BufferValidityMinutes": -1,
    "BufferByteSmallMaxCount": 5,
    "BufferByteMediumMaxCount": 1,
    "BufferByteLargeMaxCount": 0,
    "BufferCharSmallMaxCount": 5,
    "BufferCharMediumMaxCount": 2,
    "BufferCharLargeMaxCount": 0,
    "BufferWriterSmallMaxCount": 4,
    "BufferWriterLargeMaxCount": 0,
    "StringBuilderLargeMaxCount": 2
  },
  "serverproxy": {
    "verifyip": false,
    "image": {
      "cache_time": 60
    }
  },
  "tmdb": {
    "cache_img": 60
  }
}
